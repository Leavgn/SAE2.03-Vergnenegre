<div class="addMovie">
    <h3 class="addMovie__title">Ajouter un film</h3>
    <form class="addMovie__form">
        <input required type="text" name="titre" placeholder="Titre du film">
        <input required type="text" name="realisateur" placeholder="Realisateur du film">
        <input required type="number" name="annee" placeholder="Annee de sortie">
        <input required type="number" name="duree" placeholder="Duree du film">
        <input required type="text" name="description" placeholder="Description ou synopsis">

        <select name="categorie">
            <option value="drame">Drame</option>
            <option value="aventure">Aventure</option>
            <option value="animation">Animation</option>
            <option value="horreur">Horreur</option>
            <option value="sci-fi">Science-fiction</option>
            <option value="action">Action</option>
            <option value="comedie">Comedie</option>
            <option value="fantaisie">Fantaisie</option>
            <option value="documentaire">Documentaire</option>
            <option value="thriller">Thriller</option>
        </select>
        <input required type="text" name="image" placeholder="Nom du fichier image">
        <input type="url" name="trailer" placeholder="URL du trailer">
        <input required type="number" name="min_age" placeholder="Age minimum">
         <input onclick="{{onClick}}" type="button" value="Ajouter le film">
    </form>
</div>
