<div class="addMovie">
    <h3 class="addMovie__title">Ajouter un film</h3>
    <form class="addMovie__form">
        <input required type="text" name="name" placeholder="Titre du film">
        <input required type="text" name="director" placeholder="Realisateur du film">
        <input required type="number" name="year" placeholder="Annee de sortie">
        <input required type="number" name="length" placeholder="Duree du film">
        <input required type="text" name="description" placeholder="Description ou synopsis">

        <select name="id_category" id="category-select">
            <option value="">Chargement des catégories</option>
        </select>
        <input required type="text" name="image" placeholder="Nom du fichier image">
        <input type="url" name="trailer" placeholder="URL du trailer">
        <input required type="number" name="min_age" placeholder="Age minimum">
        <input onclick="{{onClick}}" type="button" class="addMovie__button" value="Ajouter le film">
    </form>
</div>
