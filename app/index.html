<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>SAE2.03 APP</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    
  </head>

  <body>
    <header id="header"></header>

    <section id="content" class="grid-view"></section>
  

    <script type="module">
      import { NavBar } from "./component/NavBar/script.js";
      import  {MovieList} from "./component/MovieList/script.js";
      import {MovieDetail} from "./component/Iteration3/script.js";
      import { MovieCategory } from "./component/MovieCategory/script.js";
      import {DataMovie} from "./data/DataMovie.js";
      

      // Controleur
      // Rappel, écrire window.C plutôt que let C est nécessaire pour tester depuis la console du navigateur
      // Une fois l'application terminée, on pourrait remettre let C.
      window.C = {};

      C.handlerAbout = function () {
        alert(
          "Ceci est une base de projet pour la SAE2.03 édition 2025. Bonne chance !"
        );
      };

      C.handlerHome = async function () {
        let movies = await DataMovie.requestMovies();
        V.renderMovieList(movies);
      };

      C.start = async function () {
    let movies = await DataMovie.requestMovies();
    let categories = await DataMovie.requestMoviesByCategory();
    V.renderNavBar("C.handlerAbout()", "C.handlerHome()", categories);
    V.renderMovieList(movies);
};

      C.handlerDetail = async function (id) {
        let movie = await DataMovie.requestMovieDetails(id);
        V.renderMovieDetail(movie);
      };

      C.handlerCategory = async function (categoryName) {
        let categories = await DataMovie.requestMoviesByCategory();
        let movies = categories[categoryName];
        V.renderMovieList(movies);
        };

     

   

      // Vue (contient tout ce qui est relatif à l'affichage)
      window.V = {};

      /**
       * V.renderNavBar
       *
       * Cette fonction est responsable de l'affichage de la barre de navigation (NavBar).
       * Elle sélectionne l'élément HTML avec l'ID "header" et y insère le contenu
       * formaté par le composant NavBar.
       */
      V.renderNavBar = function (hAbout, hHome, categories) {
        let header = document.querySelector("#header");
        header.innerHTML = NavBar.format(hAbout, hHome, categories);
      };

     V.renderMovieList = function (movies) {
       let content = document.querySelector("#content");
       content.className = "grid-view";
       let html = "";
       for (const movie of movies) {
       html += MovieList.format(movie);
       }
      content.innerHTML = html;
      };

       V.renderMovieDetail = function (movie) {
        let content = document.querySelector("#content");
        content.className = "detail-view"; 
        content.innerHTML = MovieDetail.format(movie);
      };

      V.renderMovieByCategory = function (categories) {
    let content = document.querySelector("#content");
    content.className = "grid-view";
    let html = "";
    for (const [categoryName, movies] of Object.entries(categories)) {
        html += MovieCategory.format(categoryName, movies);
    }
    content.innerHTML = html;
};


     

      C.start(); // Démarre l'application
    </script>
  </body>
</html>
<script type="module"></script>
