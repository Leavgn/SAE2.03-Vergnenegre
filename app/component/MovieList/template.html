<div class="movie-card" onclick="C.handlerDetail('{{id}}')">
  <div class="movie-card__poster">
    <img
      class="movie-card__affiche"
      src="../server/images/{{image}}"
      alt="Affiche du film {{name}}"
    />
  </div>
  <div class="movie-card__info">
    <h2 class="movie-card__title">{{name}}</h2>
  </div>
</div>
